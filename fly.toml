app = "openwebui"
primary_region = "lax"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WEBUI_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop = true
  auto_start = true
  min_machines_running = 0
  processes = ["app"]
  [http_service.checks]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/"
    restart_limit = 3
    timeout = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
