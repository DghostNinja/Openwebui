app = "openwebui-s40wtg"
primary_region = "lax"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WEBUI_PORT = "8080"
  ENABLE_MODEL_DOWNLOAD = "false"
  OFFLINE_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop = true
  auto_start = true
  min_machines_running = 0
  processes = ["app"]

[deploy]
  release_command = "echo 'Deploying...'"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
